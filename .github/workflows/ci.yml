name: CI

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  js-and-rust:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: atls-studio/package-lock.json

      - name: Install JS dependencies
        working-directory: atls-studio
        run: npm ci

      - name: Typecheck
        working-directory: atls-studio
        run: npm run typecheck

      - name: Vitest
        working-directory: atls-studio
        run: npm run test

      - name: Vitest coverage
        working-directory: atls-studio
        run: npm run test:coverage

      - name: Install Playwright Chromium
        working-directory: atls-studio
        run: npx playwright install --with-deps chromium

      - name: Playwright E2E
        working-directory: atls-studio
        run: npm run test:e2e

      # Tauri links against WebKitGTK on Linux; pkg-config needs glib-2.0.pc etc.
      - name: Install Linux dependencies for Tauri (Rust build)
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            libwebkit2gtk-4.1-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            libxdo-dev

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: llvm-tools-preview

      - uses: taiki-e/install-action@cargo-llvm-cov

      # tauri-build requires ../dist/index.html relative to src-tauri/
      - name: Build frontend for Tauri
        working-directory: atls-studio
        run: npm run build

      - name: Rust coverage (Tauri backend)
        working-directory: atls-studio/src-tauri
        run: cargo llvm-cov --all-features --lcov --output-path lcov.info

      - name: Upload Tauri LCOV coverage artifact
        uses: actions/upload-artifact@v4
        with:
          name: tauri-lcov
          path: atls-studio/src-tauri/lcov.info

      - name: Cargo test (atls-rs workspace)
        working-directory: atls-rs
        run: cargo test
